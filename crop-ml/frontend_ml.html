<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Crop Advisor — ML Model</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Archivo:wght@400;500;600;700&family=Space+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

  :root {
    --soil-deep: #2e2014;
    --turmeric: #c97a2b;
    --turmeric-bright: #e0922f;
    --cream: #f6f1e7;
    --slate: #5b6b66;
    --slate-deep: #354440;
    --paper: #fbf8f2;
    --line: rgba(46, 32, 20, 0.14);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--paper);
    font-family: 'Archivo', sans-serif;
    color: var(--soil-deep);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 80px;
  }

  .header { width: 100%; max-width: 640px; margin-bottom: 32px; }

  .header__eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--turmeric);
    margin-bottom: 14px;
  }

  .header__title {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(28px, 4vw, 38px);
    line-height: 1.1;
    margin: 0 0 10px;
  }

  .header__sub {
    font-size: 15px;
    line-height: 1.55;
    color: var(--slate-deep);
    margin: 0;
  }

  .panel {
    width: 100%;
    max-width: 640px;
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 32px;
  }

  .field-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 8px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field label {
    font-size: 12.5px;
    font-weight: 600;
    color: var(--slate-deep);
  }

  .field span.unit {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--slate);
    font-weight: 400;
  }

  .field input {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 10px 12px;
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    color: var(--soil-deep);
  }

  .field input:focus-visible {
    outline: 2px solid var(--turmeric);
    outline-offset: 1px;
  }

  .api-row {
    margin: 20px 0 24px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .api-row label {
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    color: var(--slate);
  }

  .api-row input {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 9px 12px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--soil-deep);
  }

  .predict-btn {
    width: 100%;
    background: var(--soil-deep);
    color: var(--cream);
    border: none;
    border-radius: 3px;
    padding: 14px;
    font-family: 'Archivo', sans-serif;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.18s ease;
  }

  .predict-btn:hover { background: #3d2c1e; }
  .predict-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .status {
    margin-top: 14px;
    font-size: 13px;
    font-family: 'Space Mono', monospace;
    color: var(--slate);
    text-align: center;
    min-height: 18px;
  }

  .status--error { color: #a33b2e; }

  .result {
    margin-top: 22px;
    padding-top: 22px;
    border-top: 1px solid var(--line);
    display: none;
  }

  .result--visible { display: block; }

  .result__label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--turmeric);
    margin-bottom: 8px;
  }

  .result__crop {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 28px;
    margin: 0 0 18px;
    text-transform: capitalize;
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }

  .bar-row__name {
    width: 110px;
    font-size: 13px;
    text-transform: capitalize;
    flex-shrink: 0;
  }

  .bar-row__track {
    flex: 1;
    height: 8px;
    background: var(--line);
    border-radius: 4px;
    overflow: hidden;
  }

  .bar-row__fill {
    height: 100%;
    background: var(--turmeric);
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  .bar-row__pct {
    width: 48px;
    text-align: right;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--slate);
    flex-shrink: 0;
  }

</style>
</head>
<body>

  <div class="header">
    <div class="header__eyebrow">Crop advisor · ML model</div>
    <h1 class="header__title">Predict the best crop from soil &amp; climate readings</h1>
    <p class="header__sub">
      Enter the seven readings below — the same ones used to train the model — and it predicts the most suitable crop.
    </p>
  </div>

  <div class="panel">

    <div class="api-row">
      <label for="apiUrl">Backend API URL</label>
      <input type="text" id="apiUrl" value= https://framer-udxf.onrender.com />
    </div>

    <div class="field-grid">
      <div class="field">
        <label for="N">Nitrogen (N) <span class="unit">mg/kg</span></label>
        <input type="number" id="N" value="90" step="any" />
      </div>
      <div class="field">
        <label for="P">Phosphorus (P) <span class="unit">mg/kg</span></label>
        <input type="number" id="P" value="42" step="any" />
      </div>
      <div class="field">
        <label for="K">Potassium (K) <span class="unit">mg/kg</span></label>
        <input type="number" id="K" value="43" step="any" />
      </div>
      <div class="field">
        <label for="temperature">Temperature <span class="unit">°C</span></label>
        <input type="number" id="temperature" value="20.8" step="any" />
      </div>
      <div class="field">
        <label for="humidity">Humidity <span class="unit">%</span></label>
        <input type="number" id="humidity" value="82" step="any" />
      </div>
      <div class="field">
        <label for="ph">Soil pH <span class="unit">0–14</span></label>
        <input type="number" id="ph" value="6.5" step="any" />
      </div>
      <div class="field" style="grid-column: span 2;">
        <label for="rainfall">Rainfall <span class="unit">mm</span></label>
        <input type="number" id="rainfall" value="202.9" step="any" />
      </div>
    </div>

    <button class="predict-btn" id="predictBtn">Predict crop</button>
    <div class="status" id="status"></div>

    <div class="result" id="result">
      <div class="result__label">Recommended</div>
      <h2 class="result__crop" id="resultCrop">—</h2>
      <div id="bars"></div>
    </div>

  </div>

<script>
  const predictBtn = document.getElementById("predictBtn");
  const statusEl = document.getElementById("status");
  const resultEl = document.getElementById("result");
  const resultCropEl = document.getElementById("resultCrop");
  const barsEl = document.getElementById("bars");
  const apiUrlEl = document.getElementById("apiUrl");

  const FIELDS = ["N", "P", "K", "temperature", "humidity", "ph", "rainfall"];

  predictBtn.addEventListener("click", async () => {
    const payload = {};
    for (const f of FIELDS) {
      const val = parseFloat(document.getElementById(f).value);
      if (isNaN(val)) {
        statusEl.textContent = "Please fill in " + f + " with a number.";
        statusEl.className = "status status--error";
        return;
      }
      payload[f] = val;
    }

    predictBtn.disabled = true;
    statusEl.textContent = "Asking the model…";
    statusEl.className = "status";
    resultEl.classList.remove("result--visible");

    try {
      const response = await fetch(apiUrlEl.value, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });

      if (!response.ok) {
        const errData = await response.json().catch(() => ({}));
        throw new Error(errData.error || "Server returned an error.");
      }

      const data = await response.json();

      resultCropEl.textContent = data.recommended_crop;
      barsEl.innerHTML = "";
      data.top_3.forEach((item) => {
        const row = document.createElement("div");
        row.className = "bar-row";
        row.innerHTML =
          '<div class="bar-row__name">' + item.crop + '</div>' +
          '<div class="bar-row__track"><div class="bar-row__fill" style="width:' + item.confidence + '%"></div></div>' +
          '<div class="bar-row__pct">' + item.confidence + '%</div>';
        barsEl.appendChild(row);
      });

      resultEl.classList.add("result--visible");
      statusEl.textContent = "";
    } catch (err) {
      statusEl.textContent = "Couldn't reach the model: " + err.message + " (Is the Flask server running?)";
      statusEl.className = "status status--error";
    } finally {
      predictBtn.disabled = false;
    }
  });
</script>

</body>
</html>
